plugins {
    id 'tapestry.testng-convention'
}

description = 'Allows easy exposure of Tapestry Services as JMX MBeans'

dependencies {
    implementation project(':tapestry-core')

    testImplementation project(':tapestry-test')
}

tasks.named('test') {
    exclude '**/integration/**'
}

tasks.register('testNG', Test) {
    group = 'verification'
    useTestNG {
        suiteXmlFiles << project.file('src/test/resources/testng.xml')
    }
}

tasks.named('check') {
    dependsOn 'testNG'
}

jar {
    manifest {
        attributes 'Tapestry-Module-Classes': 'org.apache.tapestry5.jmx.modules.JmxModule'
    }
}
