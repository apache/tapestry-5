// Base convention applied to every subproject in root build.gradle via `subprojects {}`
//   - Java 11 source/target compatibility
//   - 'provided' configuration (compile-only scope, like Maven <scope>provided</scope>)
//   - Dependency version constraints to keep the classpath consistent across modules
//   - JAR manifest: Automatic-Module-Name for JPMS, LICENSE/NOTICE in META-INF

plugins {
    id 'java-library'
    id 'eclipse'
    id 'idea'
    id 'groovy'
}

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8

    withSourcesJar()
}

configurations {
    // 'provided': on compile + test classpaths but excluded from the runtime jar/war.
    provided

    // 'meta': collects artifacts (e.g. sourcesJar) that should be published alongside the main jar.
    meta
}

// Ensure the 'provided' dependencies are available on the compile classpaths.
sourceSets {
    main.compileClasspath += configurations.provided
    test.compileClasspath += configurations.provided
    test.runtimeClasspath += configurations.provided
}

// Ensure IDEs understand the 'provided' configuration and more IDE setup
idea {
    module {
        scopes.PROVIDED.plus += [configurations.provided]
    }
}
eclipse.classpath.plusConfigurations += [configurations.provided]


// Enforce consistent dependency versions across all modules using constraints.
// This prevents multiple versions of the same library from appearing in the classpath.
// The versions themselves are defined in `gradle/libs.versions.toml`.
dependencies {
    constraints {
        implementation libs.commons.codec
        implementation libs.commons.io
        implementation libs.commons.logging
        implementation("${libs.hsqldb.get().module.group}:${libs.hsqldb.get().module.name}:${libs.hsqldb.get().version}:jdk8")
        implementation libs.xml.apis
    }
}

tasks.withType(Jar).configureEach {
    // Include license/notice files in the final JAR.
    from(project.projectDir) {
        include '*.txt'
        into 'META-INF'
    }

    // Stable module name for JPMS (e.g. tapestry-ioc → org.apache.tapestry.ioc).
    // Keeps the module name consistent even if the JAR file is renamed.
    manifest {
        attributes("Automatic-Module-Name": "org.apache.tapestry.${project.name}"
        .replace('tapestry-', '')
        .replace('-', '.'))
    }
}
