plugins {
    id 'tapestry.testing-base-convention'
}

dependencies {
    testImplementation libs.testng
    testImplementation libs.easymock
}

def testNGTask = tasks.register('testNG', Test) {
    group = 'verification'
    description = 'Runs TESTNG tests.'

    def suiteFiles = [
        'src/test/resources/testng.xml',
        'src/test/conf/testng.xml'
    ].collect { path -> layout.projectDirectory.file(path).asFile }

    def existingSuite = suiteFiles.find { it.exists() }

    if (existingSuite) {
        useTestNG {
            suites(existingSuite)
        }
    } else {
        useTestNG()
    }
}

tasks.named('check') {
    dependsOn(testNGTask)
}
